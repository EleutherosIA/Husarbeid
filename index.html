<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- iOS Web App Innstillinger -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Husarbeid">

    <title>Husarbeid - Logg og Oversikt</title>
    
    <style>
        :root {
            --bg: #f9f7f2;
            --card: #ffffff;
            --text: #2c2c2c;
            --secondary-text: #7c7c7c;
            --primary: #4a7c59; 
            --red: #d9534f;
            --divider: #e8e4d9;
            --input-bg: #f0ede4;
            --overlay: rgba(0,0,0,0.4);
            --accent-blue: #3498db;
        }

        [data-theme="dark"] {
            --bg: #1a1a1a;
            --card: #2c2c2c;
            --text: #f0f0f0;
            --secondary-text: #a0a0a0;
            --primary: #6ab04c;
            --red: #ff5e57;
            --divider: #3d3d3d;
            --input-bg: #3d3d3d;
            --overlay: rgba(0,0,0,0.6);
        }

        [data-theme="pink"] {
            --bg: #fff0f5;
            --card: #ffffff;
            --text: #5d3f4b;
            --secondary-text: #a0818f;
            --primary: #d63384;
            --red: #ff4d6d;
            --divider: #f8d7da;
            --input-bg: #ffe4ed;
            --overlay: rgba(80,0,40,0.3);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
            color: var(--text);
        }

        header { 
            background: var(--card); 
            padding-top: env(safe-area-inset-top, 20px);
            padding-left: 15px; padding-right: 15px; padding-bottom: 12px;
            border-bottom: 1px solid var(--divider); 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 30;
        }

        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .top-controls { 
            background: var(--card); 
            padding: 12px; 
            border-bottom: 1px solid var(--divider); 
            display: flex; flex-direction: column; gap: 8px; 
        }

        .input-group { display: flex; gap: 6px; }

        input, select { 
            padding: 10px 12px; border-radius: 12px; border: none; 
            background: var(--input-bg); font-size: 14px; color: var(--text);
            outline: none;
        }

        input { flex: 1; }

        .add-btn { 
            background: var(--primary); color: white; border: none; 
            border-radius: 12px; padding: 0 15px; font-weight: 600; font-size: 13px;
        }

        main { 
            flex: 1; 
            overflow-y: auto; 
            padding: 12px; 
            -webkit-overflow-scrolling: touch; 
            padding-bottom: 80px; 
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 4px 6px 4px;
        }

        h2 { 
            font-size: 11px; color: var(--secondary-text); text-transform: uppercase; 
            letter-spacing: 0.8px; margin: 0;
        }

        .list-container { 
            background: var(--card); border-radius: 14px; overflow: hidden; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); margin-bottom: 10px;
        }

        .swipe-container {
            position: relative;
            background-color: var(--red);
            overflow: hidden;
            user-select: none;
            touch-action: pan-y;
            border-bottom: 0.5px solid var(--divider);
        }

        .swipe-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 12px;
            background: var(--card);
            font-size: 14px;
            position: relative;
            z-index: 2;
            transition: transform 0.2s ease-out;
        }

        .delete-btn-ios {
            position: absolute;
            left: 0; top: 0; bottom: 0; width: 80px;
            background-color: var(--red); color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 800; z-index: 1;
        }

        .date-info {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .date-badge {
            font-size: 10px;
            color: var(--secondary-text);
            background: var(--input-bg);
            padding: 3px 8px;
            border-radius: 6px;
        }

        .day-counter {
            font-size: 9px;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
        }

        /* Modaler */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--overlay);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(2px);
        }

        .modal-content {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            width: 85%;
            max-width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }

        .log-list {
            margin-top: 10px;
            overflow-y: auto;
            flex: 1;
        }

        .log-item {
            padding: 10px 0;
            border-bottom: 1px solid var(--divider);
            font-size: 13px;
            display: flex;
            justify-content: space-between;
        }

        .btn { padding: 12px; border-radius: 12px; border: none; width: 100%; font-weight: 600; font-size: 14px; cursor: pointer; margin-top: 10px;}
        .lukk-btn { background: var(--divider); color: var(--text); }

        .settings-section {
            margin-bottom: 20px;
        }
        
        .settings-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--secondary-text);
            margin-bottom: 8px;
            display: block;
        }
    </style>
</head>
<body data-theme="classic">

<header>
    <h1 style="margin:0; font-size: 18px; font-weight: 800;">Husarbeid 🏠</h1>
    <div class="header-actions">
        <div onclick="openThemeSettings()" style="font-size: 22px; cursor: pointer;">🎨</div>
        <div onclick="openGeneralSettings()" style="font-size: 22px; cursor: pointer;">⚙️</div>
    </div>
</header>

<div class="top-controls">
    <div class="input-group">
        <select id="sectionSelect" style="flex: 0 0 100px;">
            <option value="">Rom...</option>
        </select>
        <input type="text" id="newTaskInput" placeholder="Hva slags husarbeid skal du gjøre?" inputmode="text">
        <button class="add-btn" onclick="addTask()">Legg til</button>
    </div>
</div>

<main id="main-content">
    <!-- Innhold genereres her -->
</main>

<!-- Logg Modal -->
<div id="logModal" class="modal-overlay" onclick="closeLogModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 id="logTitle" style="margin-top:0; font-size: 16px;">Logg</h3>
        <div id="logList" class="log-list"></div>
        <button class="btn lukk-btn" onclick="closeLogModal()">Lukk</button>
    </div>
</div>

<!-- Tema Modal -->
<div id="themeModal" class="modal-overlay" onclick="closeThemeSettings()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="margin-top:0; font-size: 16px;">Velg tema</h3>
        <div style="display: flex; gap: 15px; justify-content: center; margin: 10px 0;">
            <div style="width: 45px; height: 45px; border-radius: 50%; background: #4a7c59; cursor: pointer; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1);" onclick="setTheme('classic')"></div>
            <div style="width: 45px; height: 45px; border-radius: 50%; background: #2c2c2c; cursor: pointer; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1);" onclick="setTheme('dark')"></div>
            <div style="width: 45px; height: 45px; border-radius: 50%; background: #d63384; cursor: pointer; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1);" onclick="setTheme('pink')"></div>
        </div>
        <button class="btn lukk-btn" onclick="closeThemeSettings()">Ferdig</button>
    </div>
</div>

<!-- Innstillinger Modal -->
<div id="generalSettingsModal" class="modal-overlay" onclick="closeGeneralSettings()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="margin-top:0; font-size: 16px;">Innstillinger</h3>
        
        <div class="settings-section">
            <label class="settings-label">Legg til nytt rom / seksjon</label>
            <div class="input-group">
                <input type="text" id="newSectionInput" placeholder="Navn (f.eks. Garasjen)" inputmode="text">
                <button class="add-btn" onclick="addSection()">Lagre</button>
            </div>
        </div>

        <div class="settings-section">
            <label class="settings-label">Dine seksjoner</label>
            <div id="sectionSettingsList" style="max-height: 200px; overflow-y: auto;">
                <!-- Liste over eksisterende seksjoner -->
            </div>
        </div>

        <button class="btn lukk-btn" onclick="closeGeneralSettings()">Lukk</button>
    </div>
</div>

<script>
    // Bruker norsk lokalitet for datoer
    const norgFormat = new Intl.DateTimeFormat('no-NO', {
        weekday: 'long',
        day: 'numeric',
        month: 'long',
        year: 'numeric'
    });

    let data = JSON.parse(localStorage.getItem('hus_data')) || {
        sections: [
            { id: '1', name: 'Bad', tasks: [] },
            { id: '2', name: 'Kjøkken', tasks: [] }
        ]
    };
    let currentTheme = localStorage.getItem('hus_theme') || 'classic';

    function init() {
        setTheme(currentTheme);
        render();
    }

    function setTheme(theme) {
        document.body.setAttribute('data-theme', theme);
        currentTheme = theme;
        localStorage.setItem('hus_theme', theme);
    }

    function saveData() {
        localStorage.setItem('hus_data', JSON.stringify(data));
    }

    // Returnerer et objekt med formatert tekst og rå timestamp
    function getTaskTimeData() {
        const now = new Date();
        const formatted = norgFormat.format(now);
        // Gjør første bokstav stor (norsk Intl.DateTimeFormat starter ofte med liten)
        const capitalize = formatted.charAt(0).toUpperCase() + formatted.slice(1);
        return {
            text: capitalize + " kl. " + now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0'),
            timestamp: now.getTime()
        };
    }

    // Regner ut dager siden sist
    function calculateDaysSince(timestamp) {
        if (!timestamp) return null;
        const now = new Date().getTime();
        const diff = now - timestamp;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        return days;
    }

    function addSection() {
        const input = document.getElementById('newSectionInput');
        const name = input.value.trim();
        if (!name) return;
        data.sections.push({
            id: Date.now().toString(),
            name: name,
            tasks: []
        });
        input.value = "";
        saveData();
        render();
        updateSectionSettingsList();
    }

    function removeSection(id) {
        if(confirm("Er du sikker på at du vil slette hele seksjonen og alle oppgaver i den?")) {
            data.sections = data.sections.filter(s => s.id !== id);
            saveData();
            render();
            updateSectionSettingsList();
        }
    }

    function addTask() {
        const sectionId = document.getElementById('sectionSelect').value;
        const input = document.getElementById('newTaskInput');
        const taskName = input.value.trim();
        
        if (!sectionId || !taskName) return;
        
        const section = data.sections.find(s => s.id === sectionId);
        section.tasks.push({
            id: Date.now().toString(),
            name: taskName,
            lastDoneText: null,
            lastDoneTimestamp: null,
            log: []
        });
        
        input.value = "";
        saveData();
        render();
    }

    function updateTaskDate(sectionId, taskId) {
        const section = data.sections.find(s => s.id === sectionId);
        const taskIndex = section.tasks.findIndex(t => t.id === taskId);
        const task = section.tasks[taskIndex];
        
        const timeData = getTaskTimeData();
        task.lastDoneText = timeData.text;
        task.lastDoneTimestamp = timeData.timestamp;
        task.log.unshift(timeData.text);
        
        // Flytt til bunnen av listen
        section.tasks.splice(taskIndex, 1);
        section.tasks.push(task);
        
        saveData();
        render();
    }

    function deleteTask(sectionId, taskId) {
        const section = data.sections.find(s => s.id === sectionId);
        section.tasks = section.tasks.filter(t => t.id !== taskId);
        saveData();
        render();
    }

    // Touch Logikk (Swipe + Long Press)
    let touchStartX = 0;
    let currentSwipedElement = null;
    let longPressTimer;

    function handleStart(e, content, sectionId, taskId, taskName) {
        if (currentSwipedElement && currentSwipedElement !== content) {
            currentSwipedElement.style.transform = 'translateX(0px)';
        }
        touchStartX = e.touches[0].clientX;
        currentSwipedElement = content;
        content.style.transition = 'none';
        
        longPressTimer = setTimeout(() => {
            openLog(sectionId, taskId, taskName);
        }, 600);
    }

    function handleMove(e, content) {
        let diff = e.touches[0].clientX - touchStartX;
        if (Math.abs(diff) > 10) clearTimeout(longPressTimer);
        if (diff < 0) diff = 0;
        if (diff > 80) diff = 80;
        content.style.transform = `translateX(${diff}px)`;
    }

    function handleEnd(e, content, sectionId, taskId) {
        clearTimeout(longPressTimer);
        content.style.transition = 'transform 0.2s ease-out';
        let diff = e.changedTouches[0].clientX - touchStartX;
        if (diff > 40) {
            content.style.transform = 'translateX(80px)';
        } else {
            content.style.transform = 'translateX(0px)';
            if (Math.abs(diff) < 5) {
                updateTaskDate(sectionId, taskId);
            }
        }
    }

    // Modaler
    function openLog(sectionId, taskId, taskName) {
        const section = data.sections.find(s => s.id === sectionId);
        const task = section.tasks.find(t => t.id === taskId);
        document.getElementById('logTitle').innerText = `Logg: ${taskName}`;
        const logList = document.getElementById('logList');
        if (task.log.length === 0) {
            logList.innerHTML = '<div style="padding:20px; text-align:center; font-size:13px; color:gray;">Ingen historikk registrert enda.</div>';
        } else {
            logList.innerHTML = task.log.map((entry, i) => `
                <div class="log-item">
                    <span>${i === 0 ? 'Sist gjort:' : 'Utført:'}</span>
                    <span>${entry}</span>
                </div>
            `).join('');
        }
        document.getElementById('logModal').style.display = 'flex';
    }

    function closeLogModal() { document.getElementById('logModal').style.display = 'none'; }
    function openThemeSettings() { document.getElementById('themeModal').style.display = 'flex'; }
    function closeThemeSettings() { document.getElementById('themeModal').style.display = 'none'; }
    
    function openGeneralSettings() { 
        updateSectionSettingsList();
        document.getElementById('generalSettingsModal').style.display = 'flex'; 
    }
    
    function closeGeneralSettings() { document.getElementById('generalSettingsModal').style.display = 'none'; }

    function updateSectionSettingsList() {
        const list = document.getElementById('sectionSettingsList');
        list.innerHTML = data.sections.map(s => `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; border-bottom:1px solid var(--divider); font-size:14px;">
                <span>${s.name}</span>
                <span onclick="removeSection('${s.id}')" style="color:var(--red); font-weight:bold; cursor:pointer;">Slett</span>
            </div>
        `).join('');
    }

    function render() {
        const main = document.getElementById('main-content');
        const select = document.getElementById('sectionSelect');
        const currentVal = select.value;
        select.innerHTML = '<option value="">Rom...</option>' + 
            data.sections.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
        select.value = currentVal;

        main.innerHTML = data.sections.map(section => `
            <div class="section-header">
                <h2>${section.name}</h2>
            </div>
            <div class="list-container">
                ${section.tasks.length === 0 ? '<div style="padding:15px; font-size:12px; color:gray; text-align:center;">Ingen oppgaver her enda</div>' : ''}
                ${section.tasks.map(task => {
                    const daysSince = calculateDaysSince(task.lastDoneTimestamp);
                    let counterText = "";
                    if (daysSince !== null) {
                        if (daysSince === 0) counterText = "Nylig";
                        else if (daysSince === 1) counterText = "1 dag siden";
                        else counterText = `${daysSince} dager siden`;
                    }

                    return `
                    <div class="swipe-container">
                        <div class="delete-btn-ios" onclick="deleteTask('${section.id}', '${task.id}')">SLETT</div>
                        <div class="swipe-content" 
                             ontouchstart="handleStart(event, this, '${section.id}', '${task.id}', '${task.name}')"
                             ontouchmove="handleMove(event, this)"
                             ontouchend="handleEnd(event, this, '${section.id}', '${task.id}')">
                            <div style="font-weight:600; flex: 1; padding-right: 10px;">${task.name}</div>
                            <div class="date-info">
                                <div class="date-badge">
                                    ${task.lastDoneText ? task.lastDoneText.split(' kl.')[0] : '(ingen dato)'}
                                </div>
                                ${counterText ? `<div class="day-counter">${counterText}</div>` : ''}
                            </div>
                        </div>
                    </div>
                `}).join('')}
            </div>
        `).join('');
    }

    init();
</script>
</body>
</html>
